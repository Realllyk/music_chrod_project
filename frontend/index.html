<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐扒谱应用</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: linear-gradient(180deg, #1a1a2e, #16213e); color: #fff; padding: 20px 0; position: fixed; height: 100vh; }
        .sidebar-logo { padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .sidebar-logo h1 { font-size: 20px; color: #4ecdc4; }
        .sidebar-logo p { font-size: 12px; color: #888; margin-top: 5px; }
        .nav-item { padding: 15px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: #aaa; }
        .nav-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .nav-item.active { background: rgba(78, 205, 196, 0.2); color: #4ecdc4; }
        .nav-submenu { display: none; padding-left: 20px; }
        .nav-submenu.open { display: block; }
        .nav-item.sub { padding: 12px 20px; font-size: 14px; }
        .main-content { flex: 1; margin-left: 220px; padding: 30px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo"><h1>🎵 音乐扒谱</h1><p>Music</p></div>
        <div class="nav-item" onclick="showPage('capture')">🎙️ 录音采集</div>
        <div class="nav-item" onclick="toggleMenu('transcribeMenu')">🎼 提取 ▾</div>
        <div class="nav-submenu" id="transcribeMenu">
            <div class="nav-item sub" onclick="showPage('transcribe')">🔍 选择歌曲</div>
        </div>
        <div class="nav-item" onclick="toggleMenu('songMenu')">🎵 歌曲库 ▾</div>
        <div class="nav-submenu" id="songMenu">
            <div class="nav-item sub" onclick="showPage('songs')">🔍 查询歌曲</div>
            <div class="nav-item sub" onclick="showPage('add-song')">➕ 创建歌曲</div>
        </div>
        <div class="nav-item" onclick="toggleMenu('artistMenu')">👤 歌手 ▾</div>
        <div class="nav-submenu" id="artistMenu">
            <div class="nav-item sub" onclick="showPage('artists')">📋 歌手列表</div>
            <div class="nav-item sub" onclick="showPage('add-artist')">➕ 新增歌手</div>
        </div>
    </div>
    <div class="main-content" id="content">
        <!-- 页面内容通过 JavaScript 加载 -->
    </div>
    <script>
        const API_BASE = window.location.origin;
        
        function toggleMenu(id) { 
            document.getElementById(id).classList.toggle('open'); 
        }
        
        async function showPage(pageName) {
            console.log('Loading:', pageName);
            const content = document.getElementById('content');
            try {
                const response = await fetch('/pages/' + pageName + '.html');
                if (!response.ok) {
                    throw new Error('Page not found');
                }
                content.innerHTML = await response.text();
            } catch (e) {
                console.error(e);
                content.innerHTML = '<p>加载失败: ' + e.message + '</p>';
            }
        }
        
        // 默认加载录音采集页面
        showPage('capture');
    </script>
</body>
</html>
