<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>录音文件管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;padding:20px}
h1{margin-bottom:20px}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:14px;margin-right:8px}
.btn-primary{background:#4ecdc4;color:#fff}
.btn-danger{background:#ff6b6b;color:#fff}
.btn-secondary{background:#95a5a6;color:#fff}
.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:12px;text-align:left;border-bottom:1px solid #eee}
.table tr:hover{background:#f8f9fa}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-content{background:#fff;padding:24px;border-radius:12px;width:90%;max-width:400px}
.modal h3{margin-top:0;margin-bottom:16px}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;color:#666}
.form-group input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px}
.back{color:#4ecdc4;text-decoration:none;margin-bottom:16px;display:inline-block}
</style>
</head>
<body>
<button class="btn btn-secondary" onclick="window.location.href='/'">← 返回首页</button>
<h1>🎙️ 录音文件管理</h1>
<div class="card">
<button class="btn btn-secondary" onclick="loadRecordings()">刷新</button>
<div id="recordingsList" style="margin-top:16px"></div>
</div>

<!-- 编辑弹窗 -->
<div class="modal" id="editModal">
<div class="modal-content">
<h3>编辑文件名</h3>
<div class="form-group"><label>文件名</label><input type="text" id="editFileName"></div>
<input type="hidden" id="editSessionId">
<div style="text-align:right">
<button class="btn btn-secondary" onclick="closeEditModal()">取消</button>
<button class="btn btn-primary" onclick="saveEdit()">保存</button>
</div>
</div>
</div>

<script>
const API_BASE = '';

async function loadRecordings(){
    const d=document.getElementById('recordingsList');
    d.innerHTML='<p>加载中...</p>';
    try{
        const r=await fetch(API_BASE+'/api/capture/list?limit=100').then(x=>x.json());
        if(r.sessions&&r.sessions.length>0){
            d.innerHTML='<table class="table"><tr><th>ID</th><th>文件名</th><th>时长(秒)</th><th>状态</th><th>创建时间</th><th>操作</th></tr>'+
                r.sessions.map(s=>`<tr>
                    <td>${s.session_id}</td>
                    <td>${s.audio_name||'-'}</td>
                    <td>${s.duration_sec||'-'}</td>
                    <td>${s.status}</td>
                    <td>${s.created_at||'-'}</td>
                    <td>
                        <button class="btn btn-primary" onclick="window.location.href='/recordings/detail?id=${s.session_id}'">详情</button>
                        <button class="btn btn-primary" onclick="showEditModal('${s.session_id}','${s.audio_name||''}')">编辑</button>
                        <button class="btn btn-danger" onclick="deleteRecording('${s.session_id}')">删除</button>
                    </td>
                </tr>`).join('')+'</table>';
        }else{
            d.innerHTML='<p style="color:#aaa">暂无录音文件</p>';
        }
    }catch(e){
        d.innerHTML='<p style="color:red">加载失败: '+e.message+'</p>';
    }
}

function showEditModal(sessionId,fileName){
    document.getElementById('editSessionId').value=sessionId;
    document.getElementById('editFileName').value=fileName||'';
    document.getElementById('editModal').classList.add('show');
}

function closeEditModal(){
    document.getElementById('editModal').classList.remove('show');
}

async function saveEdit(){
    const sessionId=document.getElementById('editSessionId').value;
    const fileName=document.getElementById('editFileName').value.trim();
    if(!fileName){alert('请输入文件名');return;}
    try{
        const r=await fetch(API_BASE+'/api/capture/sessions/'+sessionId,{
            method:'PUT',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({audio_name:fileName})
        }).then(x=>x.json());
        if(r.ok){
            closeEditModal();
            loadRecordings();
        }else{
            alert(r.error||'保存失败');
        }
    }catch(e){alert(e.message);}
}

async function deleteRecording(sessionId){
    if(!confirm('确定删除这条录音？'))return;
    try{
        const r=await fetch(API_BASE+'/api/capture/sessions/'+sessionId,{method:'DELETE'}).then(x=>x.json());
        if(r.ok){
            loadRecordings();
        }else{
            alert(r.error||'删除失败');
        }
    }catch(e){alert(e.message);}
}

loadRecordings();
</script>
<script src="/js/menu.js"></script>
</body>
</html>
