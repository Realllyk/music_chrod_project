<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音源管理</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;margin:0;padding:20px}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:14px;cursor:pointer;margin-right:6px}
.btn-primary{background:#4ecdc4;color:#fff}
.btn-danger{background:#ff6b6b;color:#fff}
.btn-secondary{background:#95a5a6;color:#fff}
.table{width:100%;border-collapse:collapse;font-size:14px}
.table th{padding:12px;text-align:left;border-bottom:2px solid #eee;color:#666;font-weight:600}
.table td{padding:12px;text-align:left;border-bottom:1px solid #eee;color:#333;vertical-align:middle}
.table tr:hover{background:#f8f9fa}
</style>
</head>
<body>
<h1>🎧 音源管理</h1>
<div class="card">
<button class="btn btn-primary" onclick="location.href='/audio-sources/upload'">上传音源</button>
<button class="btn btn-secondary" onclick="loadSources()">刷新</button>
<div id="sourcesList" style="margin-top:16px"><p style="color:#aaa">加载中...</p></div>
</div>
<script src="/js/api.js"></script>
<script>
function formatFileSize(bytes) {
    if (bytes == null) return '-';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

async function loadSources(){
    const d = document.getElementById('sourcesList');
    d.innerHTML='<p style="color:#aaa">加载中...</p>';
    try{
        const r = await apiGet('/api/audio-sources/list', { limit: 100, offset: 0 });
        const items = r.items || [];
        if(items.length>0){
            d.innerHTML='<table class="table"><thead><tr><th>ID</th><th>文件名</th><th>格式</th><th>文件大小</th><th>状态</th><th>上传时间</th><th>操作</th></tr></thead><tbody>'+
                items.map(s=>`<tr>
                    <td>${s.id||'-'}</td>
                    <td>${s.audio_name||'-'}</td>
                    <td>${s.format||'-'}</td>
                    <td>${formatFileSize(s.file_size)}</td>
                    <td>${s.status||'-'}</td>
                    <td>${s.created_at||'-'}</td>
                    <td>
                        <button class="btn btn-primary" onclick="window.location.href='/audio-sources/details?id=${s.id}'">详情</button>
                        <button class="btn btn-danger" onclick="deleteSource('${s.id}')">删除</button>
                    </td>
                </tr>`).join('')+'</tbody></table>';
        }else{
            d.innerHTML='<p style="color:#aaa">暂无音源</p>';
        }
    }catch(e){
        d.innerHTML='<p style="color:red">加载失败: '+e.message+'</p>';
    }
}

async function deleteSource(id){
    if(!confirm('确定删除该音源？此操作不可撤销。'))return;
    try{
        await apiDelete('/api/audio-sources/'+id);
        loadSources();
    }catch(e){
        alert('删除失败: '+e.message);
    }
}

loadSources();
</script>
<script src="/js/menu.js"></script>
</body>
</html>
