<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音源管理</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;margin:0;padding:20px}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer;margin-right:10px}
.btn-primary{background:#4ecdc4;color:#fff}
.btn-secondary{background:#95a5a6;color:#fff}
.source-item{padding:12px;border-bottom:1px solid #eee}
.source-item:hover{background:#f8f9fa}
</style>
</head>
<body>
<h1>🎧 音源管理</h1>
<div class="card">
<button class="btn btn-primary" onclick="location.href='/audio-sources/upload'">上传音源</button>
<button class="btn btn-secondary" onclick="loadSources()">刷新</button>
<div id="sourcesList" style="margin-top:16px"></div>
</div>
<script>
const API_BASE = '';

async function loadSources(){
    const d=document.getElementById('sourcesList');
    d.innerHTML='<p>加载中...</p>';
    try{
        const r=await fetch(API_BASE+'/api/audio-sources/list').then(x=>x.json());
        if(r.sources&&r.sources.length>0){
            d.innerHTML=r.sources.map(s=>'<div class="source-item"><strong>'+s.audio_name+'</strong> <span style="color:#888">'+s.format+'</span></div>').join('');
        }else{
            d.innerHTML='<p style="color:#aaa">暂无音源</p>';
        }
    }catch(e){
        d.innerHTML='<p style="color:red">加载失败: '+e.message+'</p>';
    }
}

loadSources();
</script>
</body>
<script src="/js/menu.js"></script>
</html>
