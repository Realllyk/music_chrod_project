<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上传音源</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;margin:0;padding:20px}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.card h3{font-size:18px;margin-bottom:16px}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer}
.btn-primary{background:#4ecdc4;color:#fff}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;color:#666}
.form-group input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box}
</style>
</head>
<body>
<h1>上传音源</h1>
<div class="card">
<h3>填写音源信息</h3>
<div class="form-group">
<label>音源名称 *</label>
<input type="text" id="audioName" placeholder="例如: 我的歌">
</div>
<div class="form-group">
<label>选择音频文件 *</label>
<input type="file" id="audioFile" accept="audio/*">
</div>
<button class="btn btn-primary" onclick="uploadAudio()">上传</button>
</div>
<script>
const API_BASE = '';

async function uploadAudio() {
    const audioName = document.getElementById('audioName').value.trim();
    const audioFile = document.getElementById('audioFile').files[0];
    
    if (!audioName) {
        alert('请输入音源名称');
        return;
    }
    
    if (!audioFile) {
        alert('请选择音频文件');
        return;
    }
    
    const formData = new FormData();
    formData.append('audio_name', audioName);
    formData.append('audio_file', audioFile);
    
    try {
        const r = await fetch(API_BASE + '/api/audio-sources/upload', {
            method: 'POST',
            body: formData
        });
        
        const data = await r.json();
        
        if (data.ok) {
            alert('上传成功！音源ID: ' + data.audio_source_id);
            document.getElementById('audioName').value = '';
            document.getElementById('audioFile').value = '';
        } else {
            alert('上传失败: ' + (data.error || '未知错误'));
        }
    } catch (e) {
        alert('上传失败: ' + e.message);
    }
}
</script>
<script src="/js/menu.js"></script>
</body>
</html>
