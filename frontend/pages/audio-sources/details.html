<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音源详情</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;margin:0;padding:20px}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.card h3{font-size:18px;margin-bottom:16px;color:#333}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer;margin-right:10px}
.btn-primary{background:#4ecdc4;color:#fff}
.btn-danger{background:#ff6b6b;color:#fff}
.btn-secondary{background:#95a5a6;color:#fff}
.info-row{display:flex;margin-bottom:12px;align-items:flex-start}
.info-label{width:100px;color:#888;font-size:14px;flex-shrink:0}
.info-value{color:#333;font-size:14px;word-break:break-all}
.audio-player{width:100%;margin-top:8px}
.back{color:#4ecdc4;text-decoration:none;margin-bottom:16px;display:inline-block}
</style>
</head>
<body>
<button class="btn btn-secondary" onclick="window.location.href='/audio-sources'">← 返回音源列表</button>
<h1>🎧 音源详情</h1>
<div class="card">
<h3>基本信息</h3>
<div id="infoContent"><p style="color:#aaa">加载中...</p></div>
</div>
<div class="card" id="audioCard" style="display:none">
<h3>音频预览</h3>
<audio id="audioPlayer" controls class="audio-player"></audio>
</div>
<div class="card">
<h3>操作</h3>
<button class="btn btn-secondary" onclick="window.location.href='/audio-sources'">返回列表</button>
<button class="btn btn-danger" onclick="deleteSource()">删除音源</button>
</div>
<script src="/js/api.js"></script>
<script>
let currentId = null;

function init(){
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if(!id){ window.location.href='/audio-sources'; return; }
    currentId = id;
    loadDetail(id);
}

async function loadDetail(id){
    try{
        const s = await apiGet('/api/audio-sources/'+id);
        document.getElementById('infoContent').innerHTML = `
            <div class="info-row"><span class="info-label">ID</span><span class="info-value">${s.id||'-'}</span></div>
            <div class="info-row"><span class="info-label">文件名</span><span class="info-value">${s.audio_name||'-'}</span></div>
            <div class="info-row"><span class="info-label">格式</span><span class="info-value">${s.format||'-'}</span></div>
            <div class="info-row"><span class="info-label">文件大小</span><span class="info-value">${s.file_size!=null?s.file_size+' 字节':'-'}</span></div>
            <div class="info-row"><span class="info-label">状态</span><span class="info-value">${s.status||'-'}</span></div>
            <div class="info-row"><span class="info-label">上传时间</span><span class="info-value">${s.created_at||'-'}</span></div>
            <div class="info-row"><span class="info-label">文件路径</span><span class="info-value">${s.file_path||'-'}</span></div>
        `;
        const previewUrl = s.file_url || s.file_path || '';
        if(previewUrl){
            document.getElementById('audioCard').style.display='block';
            document.getElementById('audioPlayer').src = previewUrl;
        }
    }catch(e){
        alert('加载失败: '+e.message);
    }
}

async function deleteSource(){
    if(!confirm('确定删除该音源？此操作不可撤销。'))return;
    try{
        await apiDelete('/api/audio-sources/'+currentId);
        alert('删除成功');
        window.location.href='/audio-sources';
    }catch(e){
        alert('删除失败: '+e.message);
    }
}

init();
</script>
<script src="/js/menu.js"></script>
</body>
</html>
