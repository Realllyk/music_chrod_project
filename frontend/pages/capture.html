<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>录音采集</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;margin:0;padding:20px}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.card h3{font-size:18px;margin-bottom:16px}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer;margin-right:10px}
.btn-primary{background:#4ecdc4;color:#fff}
.btn-secondary{background:#95a5a6;color:#fff}
.btn-danger{background:#ff6b6b;color:#fff}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;color:#666}
.form-group input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box}
.status{display:flex;align-items:center;gap:10px;padding:12px;background:#f8f9fa;border-radius:8px;margin-bottom:16px}
.status-dot{width:12px;height:12px;border-radius:50%;background:#666}
.status-dot.recording{background:#ff6b6b;animation:pulse .5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-content{background:#fff;padding:24px;border-radius:12px;width:90%;max-width:400px}
.modal h3{margin-top:0}
.modal-btns{display:flex;gap:10px;margin-top:16px}
.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:12px;text-align:left;border-bottom:1px solid #eee}
.error-text{color:#e74c3c}
</style>
</head>
<body>
<h1>🎙️ 录音采集</h1>
<div class="card">
<h3>录音控制</h3>
<div class="status"><div class="status-dot" id="statusDot"></div><span id="statusText">等待开始</span></div>
<button class="btn btn-primary" id="startBtn" onclick="startRecording()">开始录音</button>
<button class="btn btn-danger" id="stopBtn" onclick="showStopDialog()" disabled>停止录音</button>
</div>
<div class="card"><h3>录音文件管理</h3>
<button class="btn btn-secondary" onclick="location.href='/recordings'">查看录音文件</button>
</div>
<div class="card"><h3>历史 <button class="btn btn-secondary" onclick="loadRecordings()">刷新</button></h3><div id="recordingsList"></div></div>

<!-- 停止录音弹窗 -->
<div class="modal" id="stopModal">
<div class="modal-content">
<h3>保存录音</h3>
<div class="form-group"><label>输入文件名</label><input type="text" id="stopFileName" placeholder="例如: 我的歌.wav"></div>
<div class="modal-btns">
<button class="btn btn-secondary" onclick="discardRecording()">放弃</button>
<button class="btn btn-secondary" onclick="closeStopDialog()">取消</button>
<button class="btn btn-primary" onclick="confirmStop()">保存</button>
</div>
</div>
</div>

<script src="/js/api.js"></script>
<script>
let currentSessionId = null;

function setStatus(state){
    const dot=document.getElementById('statusDot');
    const text=document.getElementById('statusText');
    const startBtn=document.getElementById('startBtn');
    const stopBtn=document.getElementById('stopBtn');
    if(state==='idle'){
        dot.classList.remove('recording');
        text.textContent='等待开始';
        startBtn.disabled=false;
        stopBtn.disabled=true;
    }else if(state==='recording'){
        dot.classList.add('recording');
        text.textContent='录音中';
        startBtn.disabled=true;
        stopBtn.disabled=false;
    }
}

function showStopDialog(){
    document.getElementById('stopModal').classList.add('show');
    document.getElementById('stopFileName').value = '';
    document.getElementById('stopFileName').focus();
}

function closeStopDialog(){
    document.getElementById('stopModal').classList.remove('show');
}

async function confirmStop(){
    const fileName = document.getElementById('stopFileName').value.trim();
    if(!fileName){alert('请输入文件名');return;}
    closeStopDialog();
    await stopRecording(fileName);
}

async function discardRecording(){
    if(!confirm('确定要放弃这次录音吗？'))return;
    closeStopDialog();
    await discardRecord();
}

async function discardRecord(){
    if(!currentSessionId){return;}
    try{
        await apiDelete('/api/capture/sessions/'+currentSessionId);
        setStatus('idle');
        alert('已放弃录音');
        currentSessionId=null;
        await loadRecordings();
    }catch(e){
        alert('放弃失败: '+e.message);
    }
}

async function startRecording(){
    try{
        const r=await apiPost('/api/capture/start-recording', {});
        currentSessionId=r.session_id;
        setStatus(r.status||'recording');
        alert('已开始录音: '+r.session_id);
    }catch(e){
        alert('开始录音失败: '+e.message);
    }
}

async function stopRecording(fileName){
    if(!currentSessionId){
        alert('没有活跃的录音会话');return;
    }
    try{
        await apiPut('/api/capture/stop-recording', {
            session_id:currentSessionId,
            audio_name:fileName
        });
        setStatus('idle');
        alert('录音已保存: '+fileName);
        currentSessionId=null;
        await loadRecordings();
    }catch(e){
        alert('停止录音失败: '+e.message);
    }
}

async function loadRecordings(){
    const d=document.getElementById('recordingsList');
    d.innerHTML='<p>加载中...</p>';
    try{
        const r=await apiGet('/api/capture/list',{limit:20});
        const items=r.items||[];
        if(items.length>0){
            d.innerHTML='<table class="table"><tr><th>会话ID</th><th>文件名</th><th>状态</th></tr>'+
                items.map(s=>'<tr><td>'+s.session_id+'</td><td>'+(s.audio_name||'-')+'</td><td>'+s.status+'</td></tr>').join('')+
                '</table>';
        }else{
            d.innerHTML='<p style="color:#aaa">暂无</p>';
        }
    }catch(e){
        d.innerHTML='<p class="error-text">加载失败: '+e.message+'</p>';
    }
}

loadRecordings();
</script>
<script src="../js/menu.js"></script>
</body>
</html>
