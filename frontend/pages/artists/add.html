<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新增歌手</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;margin:0;padding:20px}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.card h3{font-size:18px;margin-bottom:16px}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer;margin-right:10px}
.btn-primary{background:#4ecdc4;color:#fff}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;color:#666}
.form-group input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box}
</style>
</head>
<body>
<h1>新增歌手</h1>
<div class="card">
<h3>上传头像</h3>
<div class="form-group"><input type="file" id="avatarFile" accept="image/*" onchange="previewAvatar()"></div>
<div id="avatarPreview"></div>
</div>
<div class="card">
<h3>歌手信息</h3>
<div class="form-group"><label>名字 *</label><input type="text" id="artistName"></div>
<div class="form-group"><label>简介</label><input type="text" id="artistBio"></div>
<button class="btn btn-primary" onclick="addArtist()">保存</button>
</div>
<script>
const API_BASE = '';
function previewAvatar(){
    const file=document.getElementById('avatarFile').files[0];
    if(file){
        const reader=new FileReader();
        reader.onload=function(e){document.getElementById('avatarPreview').innerHTML='<img src="'+e.target.result+'" style="width:80px;height:80px;border-radius:50%;object-fit:cover">';};
        reader.readAsDataURL(file);
    }
}
async function addArtist(){
    const name=document.getElementById('artistName').value;
    if(!name){alert('请输入名字');return;}
    const bio=document.getElementById('artistBio').value;
    const avatarFile=document.getElementById('avatarFile').files[0];
    const formData=new FormData();
    formData.append('name',name);
    if(bio)formData.append('bio',bio);
    if(avatarFile)formData.append('avatar',avatarFile);
    try{
        const r=await fetch(API_BASE+'/api/artists/add',{method:'POST',body:formData}).then(x=>x.json());
        if(r.ok){alert('保存成功');document.getElementById('artistName').value='';document.getElementById('artistBio').value='';document.getElementById('avatarPreview').innerHTML='';}
        else{alert(r.error);}
    }catch(e){alert(e.message);}
}
</script>
</body>
<script src="/js/menu.js"></script>
</html>
