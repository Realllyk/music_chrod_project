<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>创建歌曲</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;margin:0;padding:20px}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.card h3{font-size:18px;margin-bottom:16px}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer;margin-right:10px}
.btn-primary{background:#4ecdc4;color:#fff}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;color:#666}
.form-group input,.form-group select{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box}
.tip{margin-top:8px;color:#888;font-size:12px}
</style>
</head>
<body>
<h1>创建歌曲</h1>
<div class="card">
<h3>歌曲信息</h3>
<div class="form-group"><label>歌曲名 *</label><input type="text" id="songTitle"></div>
<div class="form-group"><label>歌手</label><select id="songArtist"><option value="">-- 选择歌手 --</option></select></div>
<div class="form-group"><label>分类</label><input type="text" id="songCategory" placeholder="如：流行、古典"></div>
<div class="form-group">
<label>音源 *</label>
<select id="audioSourceId"><option value="">-- 选择音源 --</option></select>
<div class="tip">请选择已存在的音源 ID，文件上传已下线。</div>
</div>
<button class="btn btn-primary" onclick="createSong()">创建</button>
</div>
<script src="/js/api.js"></script>
<script>
async function loadAudioSources(){
    try{
        const r=await apiGet('/api/audio-sources/list');
        const sel=document.getElementById('audioSourceId');
        sel.innerHTML='<option value="">-- 选择音源 --</option>';
        (r.items||[]).forEach(source=>{
            const name=source.audio_name||source.title||source.file_path||('音源#'+source.id);
            sel.innerHTML+='<option value="'+source.id+'">#'+source.id+' - '+name+'</option>';
        });
    }catch(e){
        console.error(e);
    }
}
async function loadArtistsForSelect(){
    try{
        const r=await apiGet('/api/artists/list');
        const sel=document.getElementById('songArtist');
        sel.innerHTML='<option value="">-- 选择歌手 --</option>';
        (r.items||r.artists||[]).forEach(a=>{
            sel.innerHTML+='<option value="'+a.id+'">'+a.name+'</option>';
        });
    }catch(e){}
}
async function createSong(){
    const title=document.getElementById('songTitle').value.trim();
    if(!title){alert('请输入歌曲名');return;}
    const artistId=document.getElementById('songArtist').value;
    const category=document.getElementById('songCategory').value.trim();
    const audioSourceId=document.getElementById('audioSourceId').value;
    if(!audioSourceId){alert('请选择音源');return;}
    try{
        const r=await apiPost('/api/songs/add',{
            title,
            artist_id:artistId||null,
            category:category||null,
            audio_source_id:audioSourceId
        });
        alert('创建成功! 歌曲ID: '+r.song_id);
        document.getElementById('songTitle').value='';
        document.getElementById('songCategory').value='';
        document.getElementById('songArtist').value='';
        document.getElementById('audioSourceId').value='';
        if(r.song_id){
            window.location.href='/songs/details?id='+encodeURIComponent(r.song_id);
        }
    }catch(e){
        alert(e.message);
    }
}
loadAudioSources();
loadArtistsForSelect();
</script>
<script src="/js/menu.js"></script>
</body>
</html>
