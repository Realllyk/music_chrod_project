<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歌曲详情</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;margin:0;padding:20px}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.card h3{font-size:18px;margin-bottom:16px}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer;margin-right:10px}
.btn-primary{background:#4ecdc4;color:#fff}
.btn-danger{background:#ff6b6b;color:#fff}
.btn-secondary{background:#95a5a6;color:#fff}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;color:#666}
.form-group input,.form-group select{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box}
.audio-player{width:100%;margin-top:10px}
.audio-info{font-size:12px;color:#888;margin-top:5px}
</style>
</head>
<body>
<a href="/songs"><button class="btn btn-secondary">← 返回列表</button></a>
<h1>🎵 歌曲详情</h1>
<div class="card">
<h3>基本信息</h3>
<div class="form-group"><label>ID</label><input type="text" id="songDetailId" disabled></div>
<div class="form-group"><label>歌曲名 *</label><input type="text" id="songDetailTitle"></div>
<div class="form-group"><label>歌手</label><select id="songDetailArtist"><option value="">-- 选择歌手 --</option></select></div>
<div class="form-group"><label>分类</label><input type="text" id="songDetailCategory"></div>
</div>
<div class="card">
<h3>音源信息</h3>
<div class="form-group"><label>音源路径</label><input type="text" id="songDetailAudioPath" disabled></div>
<div class="form-group" id="audioPlayerGroup" style="display:none">
<label>播放预览</label>
<audio id="audioPlayer" controls class="audio-player"></audio>
<div class="audio-info" id="audioInfo"></div>
</div>
<div class="form-group"><label>状态</label><input type="text" id="songDetailStatus" disabled></div>
</div>
<div class="card">
<h3>操作</h3>
<button class="btn btn-primary" onclick="saveSongDetail()">保存修改</button>
<button class="btn btn-danger" onclick="deleteSongDetail()">删除</button>
</div>
<script>
const API_BASE = '';
let currentSongId=null;
let currentArtistId=null;
function init(){
    const params=new URLSearchParams(window.location.search);
    const id=params.get('id');
    if(!id){window.location.href='/songs';return;}
    loadSongDetail(id);
}
async function loadSongDetail(id){
    currentSongId=id;
    try{
        const r=await fetch(API_BASE+'/api/songs/'+id).then(x=>x.json());
        if(r.error){alert(r.error);return;}
        document.getElementById('songDetailId').value=r.id||'';
        document.getElementById('songDetailTitle').value=r.title||'';
        document.getElementById('songDetailCategory').value=r.category||'';
        document.getElementById('songDetailAudioPath').value=r.audio_path||'';
        document.getElementById('songDetailStatus').value=r.status||'';
        currentArtistId=r.artist_id;
        
        // 添加音频播放器
        const audioPath=r.audio_path;
        if(audioPath){
            document.getElementById('audioPlayerGroup').style.display='block';
            document.getElementById('audioPlayer').src=API_BASE+audioPath;
            document.getElementById('audioInfo').textContent='音频文件: '+audioPath;
        }
        
        loadArtistsForSongDetail();
    }catch(e){alert(e.message);}
}
async function loadArtistsForSongDetail(){
    try{
        const r=await fetch(API_BASE+'/api/songs/artists/list').then(x=>x.json());
        const sel=document.getElementById('songDetailArtist');
        sel.innerHTML='<option value="">-- 选择歌手 --</option>';
        (r.artists||[]).forEach(a=>{sel.innerHTML+='<option value="'+a.id+'">'+a.name+'</option>';});
        if(currentArtistId)sel.value=currentArtistId;
    }catch(e){}
}
async function saveSongDetail(){
    const title=document.getElementById('songDetailTitle').value;
    if(!title){alert('请输入歌曲名');return;}
    const artistId=document.getElementById('songDetailArtist').value;
    const category=document.getElementById('songDetailCategory').value;
    try{
        const r=await fetch(API_BASE+'/api/songs/'+currentSongId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,artist_id:artistId||null,category})}).then(x=>x.json());
        if(r.ok){alert('保存成功');window.location.href='/songs';}else{alert(r.error||'保存失败');}
    }catch(e){alert(e.message);}
}
async function deleteSongDetail(){
    if(!confirm('确定删除这首歌？'))return;
    try{
        const r=await fetch(API_BASE+'/api/songs/'+currentSongId,{method:'DELETE'}).then(x=>x.json());
        if(r.ok){alert('删除成功');window.location.href='/songs';}else{alert(r.error||'删除失败');}
    }catch(e){alert(e.message);}
}
init();
</script>
</body>
</html>
