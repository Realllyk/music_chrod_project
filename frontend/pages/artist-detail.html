<style>
.page-header { margin-bottom: 30px; }
.page-header h2 { font-size: 28px; color: #333; }
.page-header button { margin-left: 20px; }
.card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.card h3 { font-size: 18px; margin-bottom: 16px; }
.btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; margin-right: 10px; }
.btn-primary { background: #4ecdc4; color: #fff; }
.btn-danger { background: #ff6b6b; color: #fff; }
.btn-secondary { background: #95a5a6; color: #fff; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 6px; color: #666; }
.form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
</style>
<div class="page-header">
    <h2>👤 歌手详情</h2>
    <button class="btn btn-secondary" onclick="showPage('artists')">← 返回列表</button>
</div>
<div class="card">
    <h3>头像</h3>
    <div id="artistDetailAvatarPreview" style="margin-bottom:16px"></div>
    <div class="form-group"><label>更换头像</label><input type="file" id="artistDetailAvatarFile" accept="image/*"></div>
</div>
<div class="card">
    <h3>基本信息</h3>
    <div class="form-group"><label>ID</label><input type="text" id="artistDetailId" disabled></div>
    <div class="form-group"><label>名字 *</label><input type="text" id="artistDetailName"></div>
    <div class="form-group"><label>简介</label><input type="text" id="artistDetailBio"></div>
</div>
<div class="card">
    <h3>操作</h3>
    <button class="btn btn-primary" onclick="saveArtistDetail()">保存修改</button>
    <button class="btn btn-danger" onclick="deleteArtistDetail()">删除</button>
</div>
<script>
let currentArtistDetailId = null;

function init() {
    const data = JSON.parse(sessionStorage.getItem('artistDetail') || '{}');
    if(!data.id) { showPage('artists'); return; }
    currentArtistDetailId = data.id;
    document.getElementById('artistDetailId').value = data.id || '';
    document.getElementById('artistDetailName').value = data.name || '';
    document.getElementById('artistDetailBio').value = data.bio || '';
    const avatarPreview = document.getElementById('artistDetailAvatarPreview');
    if(data.avatar){
        avatarPreview.innerHTML = '<img src="'+data.avatar+'" style="width:100px;height:100px;border-radius:50%;object-fit:cover">';
    } else {
        avatarPreview.innerHTML = '<div style="width:100px;height:100px;border-radius:50%;background:#ddd;display:flex;align-items:center;justify-content:center;font-size:40px;color:#888">👤</div>';
    }
}

async function saveArtistDetail() {
    const name = document.getElementById('artistDetailName').value;
    if(!name){ alert('请输入名字'); return; }
    const bio = document.getElementById('artistDetailBio').value;
    const avatarFile = document.getElementById('artistDetailAvatarFile').files[0];
    
    if(avatarFile){
        const formData = new FormData();
        formData.append('name', name);
        formData.append('bio', bio);
        formData.append('avatar', avatarFile);
        try {
            const r = await fetch(API_BASE+'/api/songs/artists/'+currentArtistDetailId, {method:'PUT', body:formData}).then(x=>x.json());
            if(r.ok){ alert('保存成功'); showPage('artists'); }
            else{ alert(r.error||'保存失败'); }
        } catch(e){ alert(e.message); }
    } else {
        try {
            const r = await fetch(API_BASE+'/api/songs/artists/'+currentArtistDetailId, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name, bio})}).then(x=>x.json());
            if(r.ok){ alert('保存成功'); showPage('artists'); }
            else{ alert(r.error||'保存失败'); }
        } catch(e){ alert(e.message); }
    }
}

async function deleteArtistDetail() {
    if(!confirm('确定删除这个歌手？')) return;
    try {
        const r = await fetch(API_BASE+'/api/songs/artists/'+currentArtistDetailId, {method:'DELETE'}).then(x=>x.json());
        if(r.ok){ alert('删除成功'); showPage('artists'); }
        else{ alert(r.error||'删除失败'); }
    } catch(e){ alert(e.message); }
}

init();
</script>
