<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>转写历史</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;margin:0;padding:20px}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.card h3{font-size:18px;margin-bottom:16px;color:#333}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer;margin-right:10px}
.btn-primary{background:#4ecdc4;color:#fff}
.btn-secondary{background:#95a5a6;color:#fff}
.table{width:100%;border-collapse:collapse;font-size:14px}
.table th{padding:12px;text-align:left;border-bottom:2px solid #eee;color:#666;font-weight:600}
.table td{padding:12px;text-align:left;border-bottom:1px solid #eee;color:#333}
.table tr:hover{background:#f8f9fa}
.status-completed{color:#27ae60;font-weight:600}
.status-failed{color:#e74c3c;font-weight:600}
.status-pending,.status-running{color:#f39c12;font-weight:600}
.back{color:#4ecdc4;text-decoration:none;margin-bottom:16px;display:inline-block}
.song-title{font-size:14px;color:#888;margin-bottom:4px}
</style>
</head>
<body>
<button id="backLink" class="btn btn-secondary" onclick="window.location.href='/songs'">← 返回歌曲详情</button>
<h1>🎼 转写历史</h1>
<div id="songInfoCard" class="card" style="display:none">
<h3>歌曲信息</h3>
<div id="songInfo"></div>
</div>
<div class="card">
<h3>转写任务列表</h3>
<button class="btn btn-secondary" onclick="loadHistory()">刷新</button>
<div id="historyContent" style="margin-top:16px"><p style="color:#aaa">加载中...</p></div>
</div>
<script src="/js/api.js"></script>
<script>
let currentSongId = null;

function init(){
    const params = new URLSearchParams(window.location.search);
    const songId = params.get('song_id');
    if(!songId){ window.location.href='/songs'; return; }
    currentSongId = songId;
    document.getElementById('backLink').onclick = function(){
        window.location.href='/songs/details?id='+songId;
    };
    loadSongInfo(songId);
    loadHistory();
}

async function loadSongInfo(songId){
    try{
        const r = await apiGet('/api/songs/'+songId);
        const card = document.getElementById('songInfoCard');
        card.style.display='block';
        document.getElementById('songInfo').innerHTML =
            '<strong>'+(r.title||'未知歌曲')+'</strong>'+(r.artist_name?' — '+r.artist_name:'');
    }catch(e){
        console.error(e);
    }
}

async function loadHistory(){
    const d = document.getElementById('historyContent');
    d.innerHTML='<p style="color:#aaa">加载中...</p>';
    try{
        const r = await apiGet('/api/transcribe/song/'+currentSongId);
        const tasks = r.tasks||[];
        if(tasks.length===0){
            d.innerHTML='<p style="color:#aaa">暂无转写记录</p>';
            return;
        }
        d.innerHTML='<table class="table"><thead><tr><th>任务ID</th><th>模式</th><th>状态</th><th>创建时间</th><th>结果</th></tr></thead><tbody>'+
            tasks.map(t=>{
                const statusClass='status-'+(t.status||'pending');
                const statusLabel=t.status==='completed'?'已完成':t.status==='failed'?'失败':t.status==='running'?'处理中':'待处理';
                let resultCell='-';
                if(t.status==='completed'&&t.result_path){
                    resultCell='<a href="'+t.result_path+'" download style="color:#4ecdc4">下载结果</a>';
                }else if(t.status==='failed'&&t.error){
                    resultCell='<span style="color:#e74c3c;font-size:12px">'+t.error+'</span>';
                }
                return `<tr>
                    <td>${t.task_id||'-'}</td>
                    <td>${t.mode==='melody'?'旋律提取':t.mode==='chord'?'和弦分离':t.mode||'-'}</td>
                    <td class="${statusClass}">${statusLabel}</td>
                    <td>${t.created_at||'-'}</td>
                    <td>${resultCell}</td>
                </tr>`;
            }).join('')+'</tbody></table>';
    }catch(e){
        d.innerHTML='<p style="color:red">加载失败: '+e.message+'</p>';
    }
}

init();
</script>
<script src="/js/menu.js"></script>
</body>
</html>
